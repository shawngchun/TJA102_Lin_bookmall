<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <h2>分類管理</h2>
    <a th:href="@{/admin/categories/new}">新增分類</a>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>分類名稱</th>
        </tr>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}">1</td>
            <td th:text="${cat.name}">小說</td>
        </tr>
    </table>
    <a th:href="@{/}">回首頁</a>
</body>
</html>
