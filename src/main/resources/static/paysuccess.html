<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>付款結果 - 幻象書屋</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --bg: #fdfaf6;
            --text: #34495e;
            --white: #ffffff;
            --success: #27ae60;
            --error: #e74c3c;
            /* 新增失敗狀態顏色 */
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .result-card {
            background: var(--white);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border-top: 5px solid var(--success);
            /* 預設為成功綠色 */
            transition: border-color 0.3s;
        }

        /* 失敗狀態的卡片樣式 */
        .result-card.failed {
            border-top-color: var(--error);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background-color: #eafaf1;
            color: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1.5rem;
        }

        /* 失敗狀態的圖示樣式 */
        .icon-box.failed {
            background-color: #fdedec;
            color: var(--error);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 2rem;
        }

        .order-info {
            background-color: #f9f9f9;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 2rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }

        .info-label {
            color: #95a5a6;
        }

        .info-value {
            font-weight: 600;
            color: var(--text);
        }

        .price-value {
            color: var(--accent);
            font-size: 1.1rem;
        }

        .btn-group {
            display: grid;
            gap: 1rem;
        }

        .btn {
            padding: 0.9rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        @keyframes scaleUp {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-card {
            animation: scaleUp 0.5s ease-out;
        }
    </style>
</head>

<body>

    <div class="result-card" id="resultCard">
        <div class="icon-box" id="resultIcon">✓</div>
        <h1 id="resultTitle">付款成功！</h1>
        <p id="resultDesc">感謝您的訂購，我們將盡快為您安排出貨。</p>

        <div class="order-info">
            <div class="info-row">
                <span class="info-label">訂單編號</span>
                <span class="info-value" id="orderIdDisplay">載入中...</span>
            </div>
            <div class="info-row">
                <span class="info-label">付款金額</span>
                <span class="info-value price-value" id="amountDisplay">載入中...</span>
            </div>
            <div class="info-row">
                <span class="info-label">訂單日期</span>
                <span class="info-value" id="dateDisplay">--</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn btn-primary">返回首頁</a>
            <a href="orders.html" class="btn btn-outline">查看我的訂單</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const resultCard = document.getElementById('resultCard');
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const resultDesc = document.getElementById('resultDesc');

            // 1. 從 URL 取得 orderId 參數
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');

            try {
                // 2. 根據是否有 orderId 決定請求路徑
                // 如果有 ID，請求特定訂單；否則抓最後一筆 (原本的邏輯)
                const fetchUrl = orderId ? `/api/orders/${orderId}` : `/api/orders/myneworder`;

                const response = await fetch(fetchUrl);
                if (response.ok) {
                    const order = await response.json();

                    // 3. 判斷狀態與渲染資料
                    if (order.status !== 1) {
                        resultCard.classList.add('failed');
                        resultIcon.classList.add('failed');
                        resultIcon.textContent = '✕';
                        resultTitle.textContent = '付款未完成';
                        resultTitle.style.color = 'var(--error)';
                        resultDesc.textContent = '您的訂單尚未完成付款，請檢查支付狀態。';
                    }

                    document.getElementById('orderIdDisplay').textContent = `# ${order.merchantTradeNo}`;
                    document.getElementById('amountDisplay').textContent = `NT$ ${order.totalAmount}`;

                    const date = new Date(order.createdAt);
                    document.getElementById('dateDisplay').textContent =
                        date.toLocaleDateString() + ' ' +
                        date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else {
                    throw new Error('找不到訂單資訊');
                }
            } catch (error) {
                console.error('載入失敗', error);
                resultTitle.textContent = '載入錯誤';
                resultDesc.textContent = '無法取得該筆訂單資訊。';
                document.getElementById('orderIdDisplay').textContent = '資料錯誤';
            }
        });
    </script>
</body>

</html>
