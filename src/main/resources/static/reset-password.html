<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻象書屋 - 重設您的密碼</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --bg: #fdfaf6;
            --text: #34495e;
            --error: #c0392b;
            --success: #27ae60;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .reset-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin: 0;
        }

        #status-message {
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }

        .error {
            background-color: #fdeaea;
            color: var(--error);
            border: 1px solid var(--error);
        }

        .success {
            background-color: #eafaf1;
            color: var(--success);
            border: 1px solid var(--success);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1.5px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="reset-card">
        <div class="header">
            <h1>設定新密碼</h1>
            <p style="font-size: 0.85rem; color: #7f8c8d;">請為您的帳號設定一個強大的新密碼</p>
        </div>

        <div id="status-message"></div>

        <form id="resetForm">
            <input type="hidden" id="token" name="token">

            <div class="form-group">
                <label for="newPassword">新密碼</label>
                <input type="password" id="newPassword" required placeholder="請輸入新密碼">
            </div>

            <div class="form-group">
                <label for="confirmPassword">確認新密碼</label>
                <input type="password" id="confirmPassword" required placeholder="再次輸入新密碼">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">更新密碼</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // === 新增：自動跳轉邏輯 ===
            async function checkLoginAndRedirect() {
                try {
                    // 呼叫我們先前討論過的「我是誰」API
                    const response = await fetch('/api/user/me');
                    if (response.ok) {
                        // 如果後端回傳 200 OK，代表已登入，直接導向首頁
                        window.location.href = 'index.html';
                        return; // 跳轉後就不執行後面的代碼
                    }
                } catch (error) {
                    console.log("未登入或伺服器未啟動，留在登入頁");
                }
            }

            checkLoginAndRedirect();

            const resetForm = document.getElementById('resetForm');
            const statusBox = document.getElementById('status-message');
            const tokenInput = document.getElementById('token');

            // 1. 從 URL 抓取 token 參數 (例如: ?token=abc-123)
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                showStatus('無效的請求：缺少重設權杖', 'error');
                document.getElementById('submitBtn').disabled = true;
            } else {
                tokenInput.value = token;
            }

            // 2. 處理表單提交
            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    showStatus('兩次輸入的密碼不一致', 'error');
                    return;
                }

                try {
                    // 對應後端的 ResetPasswordRequest DTO
                    const response = await fetch('/api/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            token: tokenInput.value,
                            newPassword: newPassword
                        })
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        showStatus('密碼重設成功！5秒後自動導向登入頁...', 'success');
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 5000);
                    } else {
                        showStatus(result.message || '重設失敗，連結可能已過期', 'error');
                    }
                } catch (error) {
                    showStatus('伺服器連線異常，請稍後再試', 'error');
                }
            });

            function showStatus(msg, type) {
                statusBox.innerText = msg;
                statusBox.className = type;
                statusBox.style.display = 'block';
            }

            async function checkLoginAndRedirect() {
                const loginCard = document.querySelector('.login-card');
                try {
                    const response = await fetch('/api/auth/me');
                    if (response.ok) {
                        window.location.href = 'index.html';
                    } else {
                        // 如果沒登入，才把表單顯示出來
                        loginCard.style.display = 'block';
                    }
                } catch (error) {
                    loginCard.style.display = 'block';
                }
            }
        });
    </script>
</body>

</html>
