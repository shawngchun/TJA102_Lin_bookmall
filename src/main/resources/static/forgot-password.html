<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>幻象書屋 - 忘記密碼</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 延用 login.html 的 CSS 變數與卡片樣式 */
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --bg: #fdfaf6;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            color: var(--primary);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #msg {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>重設密碼</h2>
        <p style="font-size: 0.8rem; color: #666;">輸入您的註冊 Email，我們將寄送重設連結給您。</p>
        <div id="msg"></div>
        <input type="email" id="email" placeholder="請輸入 Email" required>
        <button class="btn" onclick="sendResetRequest()">發送重設連結</button>
        <p style="text-align: center; margin-top: 1rem;"><a href="/login.html"
                style="color: var(--accent); text-decoration: none; font-size: 0.85rem;">返回登入</a></p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // === 新增：自動跳轉邏輯 ===
            async function checkLoginAndRedirect() {
                try {
                    // 呼叫我們先前討論過的「我是誰」API
                    const response = await fetch('/api/user/me');
                    if (response.ok) {
                        // 如果後端回傳 200 OK，代表已登入，直接導向首頁
                        window.location.href = 'index.html';
                        return; // 跳轉後就不執行後面的代碼
                    }
                } catch (error) {
                    console.log("未登入或伺服器未啟動，留在登入頁");
                }
            }

            checkLoginAndRedirect();
        });

        async function checkLoginAndRedirect() {
            const loginCard = document.querySelector('.login-card');
            try {
                const response = await fetch('/api/auth/me');
                if (response.ok) {
                    window.location.href = 'index.html';
                } else {
                    // 如果沒登入，才把表單顯示出來
                    loginCard.style.display = 'block';
                }
            } catch (error) {
                loginCard.style.display = 'block';
            }
        }

        async function sendResetRequest() {
            const email = document.getElementById('email').value;
            const msgBox = document.getElementById('msg');

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const result = await response.json();

                msgBox.innerText = result.message;
                msgBox.style.display = 'block';
                msgBox.style.color = result.success ? 'green' : 'red';
            } catch (e) {
                alert('連線失敗');
            }
        }
    </script>
</body>

</html>
