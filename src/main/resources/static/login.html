<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻象書屋 - 會員登入</title>
    <style>
        /* CSS: 樣式設計 */
        :root {
            --primary: #2c3e50;
            /* 深藍：專業與信任 */
            --accent: #d35400;
            /* 橘色：閱讀的溫暖 */
            --bg: #fdfaf6;
            /* 米白：書頁的質感 */
            --text: #34495e;
            --error: #c0392b;
            --success: #27ae60;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .login-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            color: var(--primary);
        }

        .header p {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 0.5rem;
        }

        /* 提示框 */
        #status-message {
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
            /* 預設隱藏 */
            text-align: center;
        }

        .error {
            background-color: #fdeaea;
            color: var(--error);
            border: 1px solid var(--error);
        }

        .success {
            background-color: #eafaf1;
            color: var(--success);
            border: 1px solid var(--success);
        }

        /* 表單樣式 */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1.5px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        /* 分隔線 */
        .divider {
            margin: 2rem 0;
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #eee;
        }

        .divider span {
            position: relative;
            background: #fff;
            padding: 0 1rem;
            font-size: 0.8rem;
            color: #999;
        }

        /* OAuth2 區域 */
        .oauth-links {
            display: grid;
            gap: 0.8rem;
        }

        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .oauth-btn:hover {
            background-color: #f9f9f9;
        }

        .oauth-btn img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="header">
            <h1>幻象書屋</h1>
            <p>開始您的閱讀之旅</p>
        </div>

        <div id="status-message"></div>

        <form action="/login" method="POST" id="loginForm">
            <div class="form-group">
                <label for="email">電子郵件</label>
                <input type="text" id="email" name="email" required placeholder="請輸入email">
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" required placeholder="請輸入密碼">
            </div>
            <button type="submit" class="btn-submit">會員登入</button>
        </form>

        <div class="divider"><span>或使用社群帳號</span></div>

        <div class="oauth-links">
            <a href="/oauth2/authorization/google" class="oauth-btn">
                <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google">
                使用 Google 繼續
            </a>
        </div>

        <div class="footer">
            尚未加入？ <a href="/register.html">建立新帳號</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const statusBox = document.getElementById('status-message');
            const btnSubmit = loginForm.querySelector('.btn-submit');

            // 處理 URL 參數 (登出/錯誤提示)
            const params = new URLSearchParams(window.location.search);
            if (params.has('logout')) {
                showStatus('您已成功登出系統', 'success');
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault(); // 攔截傳統提交，避免頁面跳轉

                // 1. 取得資料並封裝成物件 (注意：欄位名稱需與後端 LoginRequest 一致)
                const formData = new FormData(loginForm);
                const data = {
                    email: formData.get('email'), // 你提到信箱即帳號，對應 LoginRequest 的 email 欄位
                    password: formData.get('password')
                };

                // 2. UI 狀態更新
                btnSubmit.innerText = '正在驗證...';
                btnSubmit.disabled = true;
                statusBox.style.display = 'none';

                try {
                    // 3. 發送 Fetch 請求到 REST API
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        window.location.href = '/successLogin.html';
                        // showStatus('登入成功！正在導向...', 'success');
                        // 登入成功，延遲一秒跳轉至首頁或會員中心
                        // setTimeout(() => window.location.href = '/index.html', 1000);
                    } else {
                        showStatus(result.message || '登入失敗，請檢查帳密', 'error');
                        resetBtn();
                    }
                } catch (error) {
                    showStatus('伺服器連線異常，請稍後再試', 'error');
                    resetBtn();
                }
            });

            function showStatus(msg, type) {
                statusBox.innerText = msg;
                statusBox.className = type; // 'error' 或 'success'
                statusBox.style.display = 'block';
            }

            function resetBtn() {
                btnSubmit.innerText = '會員登入';
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>

</html>
