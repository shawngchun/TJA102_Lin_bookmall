<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>圖書商城 - 管理員後台</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .action-btn {
            cursor: pointer;
            margin-right: 5px;
        }

        .delete-btn {
            color: red;
        }

        .stock-input {
            width: 60px;
        }

        .edit-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.85em;
            color: #007bff;
            text-decoration: none;
        }

        .edit-link:hover {
            text-decoration: underline;
            color: #0056b3;
        }
    </style>
</head>

<body>

    <h1>書籍管理控制台</h1>

    <button onclick="fetchBooks()">整理清單 (GET /api/admin/books)</button>

    <table id="book-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>書名</th>
                <th>作者</th>
                <th>價格</th>
                <th>資料更新</th>
                <th>刪除</th>
            </tr>
        </thead>
        <tbody id="book-body">
        </tbody>
    </table>

    <script>
        // 基礎路徑，對應 AdminBookController 的 @RequestMapping
        const API_BASE = '/api/admin/books';

        // 1. 列表功能 (對應 AdminBookController.listBooks)
        async function fetchBooks() {
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error('無法取得資料');

                const books = await response.json();
                renderTable(books);
            } catch (error) {
                console.error('錯誤:', error);
                alert('抓取資料失敗，請確認後端已啟動並登入。');
            }
        }

        // 渲染表格 (將 List<Book> 投影至 HTML)
        function renderTable(books) {
            const tbody = document.getElementById('book-body');
            tbody.innerHTML = '';

            books.forEach(book => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${book.id}</td>
                    <td>${book.title}</td>
                    <td>${book.author || '無'}</td>
                    <td>$${book.price}</td>
                    <td>
                        <input type="number" class="stock-input" value="${book.stock}" 
                            onchange="updateStock(${book.id}, this.value)">
                        <br>
                        <a href="book-edit.html?id=${book.id}" class="edit-link">編輯詳細資料</a>
                    </td>
                    <td>
                        <button class="action-btn delete-btn" onclick="deleteBook(${book.id})">刪除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 2. 僅調整庫存 (對應 AdminBookController.adjustStock)
        async function updateStock(id, newStock) {
            try {
                const response = await fetch(`${API_BASE}/${id}/stock`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock: parseInt(newStock) })
                });

                if (response.ok) {
                    console.log(`ID: ${id} 庫存已更新為 ${newStock}`);
                } else {
                    alert('庫存更新失敗');
                }
            } catch (error) {
                console.error('PATCH 錯誤:', error);
            }
        }

        // 3. 刪除功能 (對應 AdminBookController.remove)
        async function deleteBook(id) {
            if (!confirm('確定要刪除這本書嗎？')) return;

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('刪除成功');
                    fetchBooks(); // 重新整理表格
                } else {
                    alert('刪除失敗');
                }
            } catch (error) {
                console.error('DELETE 錯誤:', error);
            }
        }

        // 頁面載入後自動執行一次
        window.onload = fetchBooks;
    </script>
</body>

</html>
