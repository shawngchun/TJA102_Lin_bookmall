<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>書籍編輯 - 管理員後台</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .preview-img {
            max-width: 200px;
            margin-top: 10px;
            display: none;
            border: 1px solid #ddd;
        }

        .btn-save {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>書籍編輯 / 新增</h1>

    <div class="form-section">
        <input type="hidden" id="book-id">
        <div class="form-group">
            <label>書名</label>
            <input type="text" id="title" required>
        </div>

        <div class="form-group">
            <label>作者</label>
            <input type="text" id="author">
        </div>

        <div class="form-group">
            <label>價格</label>
            <input type="number" id="price" step="0.01">
        </div>

        <div class="form-group">
            <label>庫存</label>
            <input type="number" id="stock">
        </div>

        <div class="form-group">
            <label>描述</label>
            <textarea id="description" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label>書籍圖片 (ImgBB 上傳)</label>
            <input type="file" id="image-file" accept="image/*" onchange="previewImage(this)">
            <input type="hidden" id="picture-url"> <img id="img-preview" class="preview-img">
        </div>

        <button class="btn-save" onclick="handleSave()">儲存書籍</button>
        <a href="books.html">返回列表</a>
    </div>

    <script>
        // 請在此處填入你的 ImgBB API Key
        const IMGBB_API_KEY = '你的_IMGBB_API_KEY';
        const BACKEND_API = '/api/admin/books';

        // 預覽圖片
        function previewImage(input) {
            const preview = document.getElementById('img-preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 第一步：上傳圖片到 ImgBB
        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file); // 名稱要與後端 @RequestParam("image") 一致

            // 改為呼叫你自己的後端代理接口
            const response = await fetch('/api/images/upload', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || '圖片代理上傳失敗');
            }

            const result = await response.json();
            // 根據 ImgBB 回傳的結構提取 URL
            return result.url;
        }

        // 第二步：儲存書籍資訊到你的後端
        async function handleSave() {
            const fileInput = document.getElementById('image-file');
            let imageUrl = document.getElementById('picture-url').value;

            try {
                // 如果有選擇新檔案，先上傳到 ImgBB
                if (fileInput.files.length > 0) {
                    console.log('正在上傳圖片至 ImgBB...');
                    imageUrl = await uploadToImgBB(fileInput.files[0]);
                }

                const bookData = {
                    title: document.getElementById('title').value,
                    author: document.getElementById('author').value,
                    price: parseFloat(document.getElementById('price').value),
                    stock: parseInt(document.getElementById('stock').value),
                    description: document.getElementById('description').value,
                    pictureUrl: imageUrl // 這裡就是 ImgBB 回傳的連結
                };

                const bookId = document.getElementById('book-id').value;
                const method = bookId ? 'PUT' : 'POST'; // 判斷新增或修改
                const url = bookId ? `${BACKEND_API}/${bookId}` : BACKEND_API;

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookData)
                });

                if (response.ok) {
                    alert('儲存成功！');
                    window.location.href = 'books.html';
                } else {
                    alert('後端儲存失敗');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('發生錯誤: ' + error.message);
            }
        }
    </script>
</body>

</html>
